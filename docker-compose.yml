services:
  postgres:
    image: postgres:17-alpine
    container_name: ab-test-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ab-test-dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: deps
    container_name: ab-test-dashboard-api
    restart: unless-stopped
    env_file: .env.local
    command: pnpm --filter @ab-test-dashboard/api dev
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/database:/app/packages/database
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    container_name: ab-test-dashboard-web
    restart: unless-stopped
    env_file: .env.local
    command: pnpm --filter @ab-test-dashboard/web dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      - api

volumes:
  pgdata:
